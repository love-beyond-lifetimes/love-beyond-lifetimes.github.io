<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Beyond Lifetimes — Secret Note</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/secret-note.css">
</head>
<body>
  <div class="page-bg"></div>
  <div class="petals-container" id="petals"></div>
  <div class="transition-overlay" id="transition-overlay"></div>
  <button id="music-btn" onclick="toggleMusic()">♪ ON</button>

  <div class="page-content secret-content">

    <div class="secret-lines" id="secret-lines">
      <p class="sline pink pixel" id="sline-0">loving you feels strangely soft.</p>
      <p class="sline" id="sline-1">like warm sunsets.</p>
      <p class="sline" id="sline-2">like quiet late night talks.</p>
      <p class="sline" id="sline-3">like finally finding someone who feels safe to stay with.</p>
      <p class="sline" id="sline-4">you somehow became part of my everyday life so naturally...</p>
      <p class="sline" id="sline-5">and now i can't imagine my days without you in them anymore.</p>
    </div>

    <div class="secret-continue" id="secret-continue" style="opacity:0;">
      <button class="btn-pixel glow" onclick="SFX.nextButton(); goTo('love-simulator.html')">
        Continue To Round 02 →
      </button>
    </div>

  </div>

  <script src="js/global.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      spawnPetals(document.getElementById('petals'), 16);
      spawnHearts(document.getElementById('petals'), 6);

      const lines = document.querySelectorAll('.sline');
      lines.forEach((line, i) => {
        setTimeout(() => {
          line.classList.add('visible');
        }, 600 + i * 700);
      });

      // Show button after all lines
      setTimeout(() => {
        const cont = document.getElementById('secret-continue');
        cont.style.transition = 'opacity 0.8s';
        cont.style.opacity = '1';
      }, 600 + lines.length * 700 + 400);
    });
  </script>
</body>
</html>
